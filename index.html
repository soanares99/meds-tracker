<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de remédios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF4FF;
    --surface: #FFFFFF;
    --surface-2: #F1E6FF;
    --ink: #2B1B4D;
    --ink-soft: #8577A8;
    --teal: #7C3AED;
    --teal-deep: #5B21B6;
    --amber: #FDB933;
    --amber-light: #FFEEBE;
    --amber-deep: #92600A;
    --brick: #F4436C;
    --border: rgba(43,27,77,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:40px 20px 80px;
  }
  header{
    margin-bottom:28px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:28px;
    margin:0 0 4px;
    letter-spacing:-0.02em;
  }
  .sub{
    color:var(--ink-soft);
    font-size:14px;
    margin:0;
  }
  .today-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--teal-deep);
    background:var(--surface-2);
    padding:4px 10px;
    border-radius:20px;
    margin-top:10px;
  }
  section{margin-bottom:36px;}
  .tabs{
    display:flex;
    gap:22px;
    border-bottom:1px solid var(--border);
    margin-bottom:24px;
  }
  .tab-btn{
    background:none;
    border:none;
    padding:0 0 12px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .tab-btn:hover{color:var(--ink);}
  .tab-btn.active{
    color:var(--ink);
    border-bottom-color:var(--teal);
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .section-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .med-grid{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .time-group{margin-bottom:16px;}
  .time-group-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .time-group-label .dot{
    width:6px;height:6px;border-radius:50%;background:var(--amber);
  }
  .med-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:0;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    transition:transform 0.12s ease;
  }
  .med-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
  }
  .med-name{
    font-weight:600;
    font-size:15px;
    white-space:nowrap;
  }
  .med-dose{
    font-size:12px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    white-space:nowrap;
  }
  .med-actions-inline{
    display:flex;
    align-items:center;
    gap:4px;
    margin-left:auto;
  }
  .take-btn{
    border:1px solid var(--border);
    background:none;
    padding:6px 12px;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    color:var(--teal-deep);
    cursor:pointer;
    white-space:nowrap;
  }
  .take-btn:active{transform:scale(0.97);}
  .take-btn:hover{background:rgba(47,111,98,0.07);}
  .remove-med{
    border:none;
    background:none;
    width:28px;
    height:28px;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:15px;
    border-radius:8px;
  }
  .remove-med:hover{color:var(--brick);background:rgba(176,80,58,0.08);}
  .edit-med{
    border:none;
    background:none;
    padding:6px 8px;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    border-radius:8px;
    white-space:nowrap;
  }
  .edit-med:hover{color:var(--ink);background:var(--surface-2);}
  .edit-form{
    padding:12px;
  }
  .edit-form-title{
    font-weight:600;
    font-size:14px;
    margin-bottom:8px;
  }
  .edit-row{
    display:flex;
    gap:8px;
    margin-bottom:8px;
  }
  .edit-row input{flex:1;min-width:0;}
  .edit-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
  }
  .save-edit-btn{
    padding:8px 14px;
    border-radius:8px;
    border:none;
    background:var(--teal);
    color:#fff;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .save-edit-btn:hover{background:var(--teal-deep);}
  .cancel-edit-btn{
    padding:8px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    background:none;
    color:var(--ink-soft);
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .cancel-edit-btn:hover{color:var(--ink);}
  .just-taken{
    animation:flash 0.6s ease;
  }
  @keyframes flash{
    0%{background:var(--amber-light);}
    100%{background:var(--surface);}
  }
  .add-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }
  .add-row input{flex:0 0 auto;}
  .add-row #name-input{flex:1 1 150px;}
  input[type=text]{
    flex:1;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--teal);outline-offset:1px;}
  input[type=text]::placeholder{color:var(--ink-soft);}
  #dose-input{max-width:110px;}
  #tag-input{max-width:110px;}
  input[type=number]{
    padding:10px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink);
    max-width:78px;
  }
  input[type=number]:focus{outline:2px solid var(--teal);outline-offset:1px;}
  .course-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--teal-deep);
    background:var(--surface-2);
    padding:2px 7px;
    border-radius:6px;
    white-space:nowrap;
    cursor:pointer;
    border:none;
  }
  .course-badge.complete{
    background:var(--amber-light);
    color:var(--amber-deep);
  }
  .course-set-btn{
    font-size:11px;
    color:var(--ink-soft);
    background:none;
    border:1px dashed var(--border);
    padding:2px 8px;
    border-radius:6px;
    cursor:pointer;
    white-space:nowrap;
  }
  .course-set-btn:hover{color:var(--ink);border-color:var(--border-strong);}
  .course-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:0 12px 10px;
  }
  input[type=time]{
    padding:10px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--ink);
    max-width:110px;
  }
  input[type=time]:focus{outline:2px solid var(--teal);outline-offset:1px;}
  .med-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--teal-deep);
    background:var(--surface-2);
    padding:2px 7px;
    border-radius:6px;
  }
  .status-due{
    font-size:11px;
    font-weight:600;
    color:var(--brick);
  }
  .status-done{
    font-size:11px;
    font-weight:600;
    color:var(--teal-deep);
  }
  .tag-badge{
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:6px;
    white-space:nowrap;
  }
  .tag-c0{background:#CFF7E8;color:#04785A;}
  .tag-c1{background:#FFE3AC;color:#92500A;}
  .tag-c2{background:#E9D8FE;color:#6D28D9;}
  .tag-c3{background:#FFD3E6;color:#BE185D;}
  .add-btn{
    padding:10px 16px;
    border-radius:10px;
    border:none;
    background:var(--teal);
    color:#fff;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
  }
  .add-btn:hover{background:var(--teal-deep);}
  .empty{
    color:var(--ink-soft);
    font-size:13px;
    padding:18px 0;
    text-align:center;
    border:1px dashed var(--border);
    border-radius:12px;
  }
  .metric-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:8px;
  }
  .metric-name{
    font-weight:600;
    font-size:14px;
    flex:1;
  }
  .metric-stat{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    min-width:78px;
  }
  .metric-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:500;
    color:var(--teal-deep);
  }
  .metric-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .day-group{margin-bottom:18px;}
  .day-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .log-entry{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 4px;
    border-bottom:1px solid var(--border);
    font-size:14px;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--teal-deep);
    background:var(--surface-2);
    padding:2px 7px;
    border-radius:6px;
    min-width:60px;
    text-align:center;
  }
  .log-name{flex:1;font-weight:500;}
  .log-dose{color:var(--ink-soft);font-size:12px;font-family:'IBM Plex Mono',monospace;}
  .del-log{
    border:none;background:none;color:var(--ink-soft);
    cursor:pointer;font-size:14px;padding:2px 4px;
  }
  .del-log:hover{color:var(--brick);}
  .loading{color:var(--ink-soft);font-size:13px;padding:20px 0;text-align:center;}
  .sync-row{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--ink-soft);
  }
  .sync-row .sync-code{
    font-family:'IBM Plex Mono',monospace;
    background:var(--surface-2);
    padding:3px 8px;
    border-radius:6px;
    color:var(--teal-deep);
  }
  .sync-row button{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }
  .sync-row button:hover{color:var(--ink);}
  .setup-screen{
    display:flex;
    justify-content:center;
    padding:40px 0;
  }
  .setup-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:24px;
    max-width:420px;
  }
  .setup-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:17px;
    margin-bottom:8px;
  }
  .setup-copy{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.5;
    margin:0 0 16px;
  }
  .setup-divider{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    margin:16px 0;
  }
  .setup-card .add-btn{width:100%;}
  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%) scale(0.9);
    background:var(--teal);
    color:#fff;
    font-size:13px;
    font-weight:600;
    padding:10px 18px;
    border-radius:20px;
    opacity:0;
    transition:opacity 0.2s ease, transform 0.2s ease;
    pointer-events:none;
    z-index:10;
    box-shadow:0 6px 18px rgba(124,58,237,0.35);
  }
  .toast.show{opacity:1;transform:translateX(-50%) scale(1);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Remédios</h1>
    <p class="sub">Registre o que você tomou, e quando.</p>
    <div class="today-pill" id="today-pill"></div>
    <div class="sync-row" id="sync-row"></div>
  </header>

  <div id="setup-screen" class="setup-screen" style="display:none;">
    <div class="setup-card">
      <div class="setup-title">Configurar sincronização</div>
      <p class="setup-copy">Crie um código de sincronização uma vez e digite esse mesmo código em cada dispositivo para compartilhar esses dados entre eles. Guarde-o em um lugar seguro — qualquer pessoa com o código pode ver e editar esses dados.</p>
      <button class="add-btn" id="create-sync-btn">Criar novo código de sincronização</button>
      <div class="setup-divider">ou</div>
      <div class="add-row">
        <input type="text" id="join-code-input" placeholder="Digite um código existente">
        <button class="add-btn" id="join-sync-btn">Conectar</button>
      </div>
      <div class="setup-copy" style="margin-top:14px;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="skip-sync-checkbox" style="width:auto;">
          Pular por agora, usar só este dispositivo
        </label>
      </div>
    </div>
  </div>

  <div id="app-content" style="display:none;">
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="meds" role="tab" aria-selected="true">Medicamentos</button>
      <button class="tab-btn" data-tab="metrics" role="tab" aria-selected="false">Métricas</button>
      <button class="tab-btn" data-tab="history" role="tab" aria-selected="false">Histórico</button>
    </nav>

    <section class="tab-panel active" data-panel="meds">
      <div id="med-list"></div>
      <div class="add-row">
        <input type="text" id="name-input" placeholder="Nome do medicamento">
        <input type="text" id="dose-input" placeholder="Dose (opcional)">
        <input type="text" id="tag-input" placeholder="Categoria (opcional)">
        <input type="time" id="time-input" title="Horário para tomar (opcional)">
        <input type="number" id="course-day-input" placeholder="Dia" min="0" title="Dia atual do tratamento (opcional)">
        <input type="number" id="course-total-input" placeholder="de dias" min="1" title="Duração total do tratamento (opcional)">
        <button class="add-btn" id="add-btn">Adicionar</button>
      </div>
    </section>

    <section class="tab-panel" data-panel="metrics">
      <div id="metrics"></div>
    </section>

    <section class="tab-panel" data-panel="history">
      <div id="history"></div>
    </section>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let meds = [];
let logs = [];
let editingId = null;
let syncId = localStorage.getItem('meds-sync-id') || '';

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function randomCode(){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = '';
  for(let i=0;i<10;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function kvGet(){
  const res = await fetch(`https://kvdb.io/${syncId}/data`);
  if(res.status === 404) return { meds: [], logs: [] };
  if(!res.ok) throw new Error('sync read failed');
  const text = await res.text();
  return text ? JSON.parse(text) : { meds: [], logs: [] };
}

async function kvSet(){
  await fetch(`https://kvdb.io/${syncId}/data`, {
    method: 'PUT',
    body: JSON.stringify({ meds, logs })
  });
}

function renderSyncRow(){
  const row = document.getElementById('sync-row');
  if(!syncId){
    row.innerHTML = '<span>Não sincronizado</span> <button id="setup-link">configurar sincronização</button>';
    document.getElementById('setup-link').addEventListener('click', showSetupScreen);
    return;
  }
  row.innerHTML = `<span>Sincronizado</span> <span class="sync-code">${syncId}</span> <button id="copy-code-btn">copiar</button> <button id="change-code-btn">alterar</button>`;
  document.getElementById('copy-code-btn').addEventListener('click', ()=>{
    navigator.clipboard.writeText(syncId);
    showToast('Código copiado');
  });
  document.getElementById('change-code-btn').addEventListener('click', showSetupScreen);
}

function showSetupScreen(){
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('app-content').style.display = 'none';
}

function hideSetupScreen(){
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}

async function loadData(){
  if(!syncId){
    showSetupScreen();
    renderSyncRow();
    return;
  }
  hideSetupScreen();
  renderSyncRow();
  document.getElementById('med-list').innerHTML = '<div class="loading">Carregando seus remédios...</div>';
  document.getElementById('history').innerHTML = '<div class="loading">Carregando histórico...</div>';
  try{
    const data = await kvGet();
    meds = data.meds || [];
    logs = data.logs || [];
  }catch(e){
    meds = [];
    logs = [];
    showToast('Não foi possível conectar — verifique sua conexão');
  }
  render();
}

async function saveMeds(){
  try{ await kvSet(); }
  catch(e){ showToast('Não foi possível salvar — verifique sua conexão'); }
}
async function saveLogs(){
  try{ await kvSet(); }
  catch(e){ showToast('Não foi possível salvar — verifique sua conexão'); }
}

document.getElementById('create-sync-btn').addEventListener('click', async ()=>{
  syncId = randomCode();
  localStorage.setItem('meds-sync-id', syncId);
  meds = [];
  logs = [];
  await kvSet();
  loadData();
  showToast('Código criado — copie para seus outros dispositivos');
});

document.getElementById('join-sync-btn').addEventListener('click', ()=>{
  const code = document.getElementById('join-code-input').value.trim();
  if(!code) return;
  syncId = code;
  localStorage.setItem('meds-sync-id', syncId);
  loadData();
});

document.getElementById('skip-sync-checkbox').addEventListener('change', (e)=>{
  if(e.target.checked){
    syncId = 'local-' + randomCode();
    localStorage.setItem('meds-sync-id', syncId);
    kvSet();
    loadData();
  }
});

function formatToday(){
  const d = new Date();
  return d.toLocaleDateString('pt-BR', { weekday:'long', month:'short', day:'numeric' });
}

function formatTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function formatDayLabel(iso){
  const d = new Date(iso);
  const today = new Date();
  const yest = new Date(); yest.setDate(today.getDate()-1);
  const sameDay = (a,b)=> a.toDateString()===b.toDateString();
  if(sameDay(d,today)) return 'Hoje';
  if(sameDay(d,yest)) return 'Ontem';
  return d.toLocaleDateString('pt-BR', { weekday:'short', month:'short', day:'numeric' });
}

function render(){
  document.getElementById('today-pill').innerHTML = '<i class="ti"></i>' + formatToday();
  renderMeds();
  renderMetrics();
  renderHistory();
}

function renderMeds(){
  const list = document.getElementById('med-list');
  if(meds.length === 0){
    list.innerHTML = '<div class="empty">Nenhum medicamento ainda. Adicione o primeiro abaixo.</div>';
    return;
  }

  const groups = {};
  meds.forEach(m=>{
    const key = m.time || 'none';
    if(!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  const timedKeys = Object.keys(groups).filter(k=>k!=='none').sort();
  const orderedKeys = groups['none'] ? [...timedKeys, 'none'] : timedKeys;

  list.innerHTML = orderedKeys.map(key=>{
    const groupLabel = key === 'none' ? 'Sem horário definido' : formatTimeStr(key);
    const cards = groups[key].map(m => medCardHtml(m)).join('');
    return `
      <div class="time-group">
        <div class="time-group-label"><span class="dot"></span>${groupLabel}</div>
        <div class="med-grid">${cards}</div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.take-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> logTaken(btn.dataset.id));
  });
  list.querySelectorAll('.remove-med').forEach(btn=>{
    btn.addEventListener('click', ()=> removeMed(btn.dataset.id));
  });
  list.querySelectorAll('.edit-med, .course-badge, .course-set-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> editMed(btn.dataset.id));
  });
  list.querySelectorAll('.save-edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> saveEdit(btn.dataset.id));
  });
  list.querySelectorAll('.cancel-edit-btn').forEach(btn=>{
    btn.addEventListener('click', cancelEdit);
  });
}

function tagColorClass(tag){
  let hash = 0;
  for(let i=0;i<tag.length;i++) hash = (hash + tag.charCodeAt(i)) % 4;
  return 'tag-c' + hash;
}

function courseBadgeHtml(m){
  const day = m.courseDay || 0;
  const total = m.courseTotal;
  const complete = day >= total;
  return `<button class="course-badge ${complete ? 'complete' : ''}" data-id="${m.id}">${complete ? 'Tratamento completo' : `Dia ${day} de ${total}`}</button>`;
}

function editMed(id){
  editingId = id;
  renderMeds();
}

function cancelEdit(){
  editingId = null;
  renderMeds();
}

async function saveEdit(id){
  const med = meds.find(m => m.id === id);
  if(!med) return;
  const card = document.getElementById('card-'+id);
  const dose = card.querySelector('.edit-dose').value.trim();
  const time = card.querySelector('.edit-time').value;
  const dayVal = card.querySelector('.edit-day').value;
  const totalVal = card.querySelector('.edit-total').value;
  med.dose = dose || null;
  med.time = time || null;
  med.courseDay = dayVal ? parseInt(dayVal, 10) : null;
  med.courseTotal = (totalVal && parseInt(totalVal, 10) > 0) ? parseInt(totalVal, 10) : null;
  editingId = null;
  await saveMeds();
  renderMeds();
  renderMetrics();
}

function editFormHtml(m){
  return `
    <div class="med-card" id="card-${m.id}">
      <div class="edit-form">
        <div class="edit-form-title">${escapeHtml(m.name)}</div>
        <div class="edit-row">
          <input type="text" class="edit-dose" placeholder="Dose" value="${m.dose ? escapeHtml(m.dose) : ''}">
          <input type="time" class="edit-time" value="${m.time || ''}">
        </div>
        <div class="edit-row">
          <input type="number" class="edit-day" placeholder="Dia" min="0" value="${m.courseDay ?? ''}">
          <input type="number" class="edit-total" placeholder="de dias" min="1" value="${m.courseTotal ?? ''}">
        </div>
        <div class="edit-actions">
          <button class="save-edit-btn" data-id="${m.id}">Salvar</button>
          <button class="cancel-edit-btn">Cancelar</button>
        </div>
      </div>
    </div>
  `;
}

function medCardHtml(m){
  if(editingId === m.id) return editFormHtml(m);
  const status = getStatus(m);
  return `
    <div class="med-card" id="card-${m.id}">
      <div class="med-row">
        <span class="med-name">${escapeHtml(m.name)}</span>
        ${m.dose ? `<span class="med-dose">${escapeHtml(m.dose)}</span>` : ''}
        ${status.label ? `<span class="${status.cls}">${status.label}</span>` : ''}
        <div class="med-actions-inline">
          <button class="take-btn" data-id="${m.id}">Marcar tomado</button>
          <button class="edit-med" data-id="${m.id}" aria-label="Editar ${escapeHtml(m.name)}">Editar</button>
          <button class="remove-med" data-id="${m.id}" aria-label="Remover ${escapeHtml(m.name)}">&times;</button>
        </div>
      </div>
      <div class="course-row">
        ${m.tag ? `<span class="tag-badge ${tagColorClass(m.tag)}">${escapeHtml(m.tag)}</span>` : ''}
        ${m.courseTotal ? courseBadgeHtml(m) : `<button class="course-set-btn" data-id="${m.id}">+ definir duração</button>`}
      </div>
    </div>
  `;
}

function renderHistory(){
  const container = document.getElementById('history');
  if(logs.length === 0){
    container.innerHTML = '<div class="empty">Nada registrado ainda. Marque um medicamento como tomado acima.</div>';
    return;
  }
  const sorted = [...logs].sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));
  const groups = {};
  sorted.forEach(l=>{
    const key = new Date(l.timestamp).toDateString();
    if(!groups[key]) groups[key] = [];
    groups[key].push(l);
  });

  container.innerHTML = Object.keys(groups).map(key=>{
    const entries = groups[key];
    const label = formatDayLabel(entries[0].timestamp);
    const rows = entries.map(l=>`
      <div class="log-entry">
        <span class="log-time">${formatTime(l.timestamp)}</span>
        <span class="log-name">${escapeHtml(l.name)}</span>
        ${l.dose ? `<span class="log-dose">${escapeHtml(l.dose)}</span>` : ''}
        ${l.tag ? `<span class="tag-badge ${tagColorClass(l.tag)}">${escapeHtml(l.tag)}</span>` : ''}
        <button class="del-log" data-id="${l.id}" aria-label="Excluir registro">&times;</button>
      </div>
    `).join('');
    return `<div class="day-group"><div class="day-label">${label}</div>${rows}</div>`;
  }).join('');

  container.querySelectorAll('.del-log').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteLog(btn.dataset.id));
  });
}

function formatTimeStr(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.toLocaleTimeString('pt-BR', { hour:'numeric', minute:'2-digit' });
}

function getStatus(med){
  const today = new Date().toDateString();
  const takenToday = logs.find(l => l.medId === med.id && new Date(l.timestamp).toDateString() === today);
  if(takenToday){
    return { label: 'Tomado às ' + formatTime(takenToday.timestamp), cls: 'status-done' };
  }
  if(med.time){
    const now = new Date();
    const [h,m] = med.time.split(':').map(Number);
    const scheduled = new Date();
    scheduled.setHours(h, m, 0, 0);
    if(now > scheduled){
      return { label: 'Atrasado', cls: 'status-due' };
    }
  }
  return { label: '', cls: '' };
}

function computeStreak(medId){
  const days = new Set(
    logs.filter(l => l.medId === medId).map(l => new Date(l.timestamp).toDateString())
  );
  if(days.size === 0) return 0;

  const cursor = new Date();
  cursor.setHours(0,0,0,0);

  if(!days.has(cursor.toDateString())){
    cursor.setDate(cursor.getDate() - 1);
    if(!days.has(cursor.toDateString())) return 0;
  }

  let streak = 0;
  while(days.has(cursor.toDateString())){
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function computeAvgTime(medId){
  const times = logs.filter(l => l.medId === medId).map(l => {
    const d = new Date(l.timestamp);
    return d.getHours() * 60 + d.getMinutes();
  });
  if(times.length === 0) return null;
  const avgMinutes = Math.round(times.reduce((a,b)=>a+b, 0) / times.length);
  const d = new Date();
  d.setHours(Math.floor(avgMinutes / 60), avgMinutes % 60, 0, 0);
  return d.toLocaleTimeString('pt-BR', { hour:'numeric', minute:'2-digit' });
}

function renderMetrics(){
  const container = document.getElementById('metrics');
  if(meds.length === 0){
    container.innerHTML = '<div class="empty">Adicione um medicamento para começar a acompanhar as métricas.</div>';
    return;
  }
  const sorted = [...meds].sort((a,b)=>{
    if(!a.time && !b.time) return 0;
    if(!a.time) return 1;
    if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
  container.innerHTML = sorted.map(m => {
    const streak = computeStreak(m.id);
    const avg = computeAvgTime(m.id);
    return `
      <div class="metric-row">
        <span class="metric-name">${escapeHtml(m.name)}</span>
        ${m.tag ? `<span class="tag-badge ${tagColorClass(m.tag)}">${escapeHtml(m.tag)}</span>` : ''}
        <div class="metric-stat">
          <span class="metric-value">${streak > 0 ? streak + (streak===1 ? ' dia' : ' dias') : '—'}</span>
          <span class="metric-label">Sequência</span>
        </div>
        <div class="metric-stat">
          <span class="metric-value">${avg || '—'}</span>
          <span class="metric-label">Horário médio</span>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function addMed(){
  const nameInput = document.getElementById('name-input');
  const doseInput = document.getElementById('dose-input');
  const tagInput = document.getElementById('tag-input');
  const timeInput = document.getElementById('time-input');
  const courseDayInput = document.getElementById('course-day-input');
  const courseTotalInput = document.getElementById('course-total-input');
  const name = nameInput.value.trim();
  const dose = doseInput.value.trim();
  const tag = tagInput.value.trim();
  const time = timeInput.value;
  const courseDay = courseDayInput.value ? parseInt(courseDayInput.value, 10) : null;
  const courseTotal = courseTotalInput.value ? parseInt(courseTotalInput.value, 10) : null;
  if(!name) { nameInput.focus(); return; }
  meds.push({ id: uid(), name, dose, tag: tag || null, time: time || null, courseDay, courseTotal });
  nameInput.value = '';
  doseInput.value = '';
  tagInput.value = '';
  timeInput.value = '';
  courseDayInput.value = '';
  courseTotalInput.value = '';
  await saveMeds();
  renderMeds();
  renderMetrics();
  nameInput.focus();
}

async function removeMed(id){
  meds = meds.filter(m => m.id !== id);
  await saveMeds();
  renderMeds();
  renderMetrics();
}

function streakMessage(name, streak){
  if(streak <= 1){
    return `✨ ${name} registrado! Primeiro dia da sequência`;
  }
  const phrases = ['Arrasou!', 'Isso aí!', 'Muito bem!', 'Você é demais!', 'Continue assim!'];
  const phrase = phrases[Math.floor(Math.random() * phrases.length)];
  return `🔥 ${phrase} ${streak} dias seguidos de ${name}`;
}

async function logTaken(id){
  const med = meds.find(m => m.id === id);
  if(!med) return;
  const alreadyTakenToday = !!getStatus(med).label && getStatus(med).cls === 'status-done';
  const now = new Date().toISOString();
  logs.push({ id: uid(), medId: med.id, name: med.name, dose: med.dose, tag: med.tag, timestamp: now });
  if(!alreadyTakenToday && med.courseTotal){
    med.courseDay = Math.min((med.courseDay || 0) + 1, med.courseTotal);
    await saveMeds();
  }
  await saveLogs();
  renderHistory();
  renderMeds();
  renderMetrics();
  showToast(streakMessage(med.name, computeStreak(med.id)));
  const card = document.getElementById('card-'+id);
  if(card){
    card.classList.add('just-taken');
    setTimeout(()=>card.classList.remove('just-taken'), 650);
  }
}

async function deleteLog(id){
  logs = logs.filter(l => l.id !== id);
  await saveLogs();
  renderHistory();
  renderMeds();
  renderMetrics();
}

document.getElementById('add-btn').addEventListener('click', addMed);
document.getElementById('name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });
document.getElementById('dose-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });
document.getElementById('tag-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });
document.getElementById('time-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });
document.getElementById('course-day-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });
document.getElementById('course-total-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addMed(); });

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>{
      b.classList.remove('active');
      b.setAttribute('aria-selected','false');
    });
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
  });
});
